name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build

      - name: Generate release manifest
        run: |
          cd packages/cli
          echo '{"version":"${{ github.ref_name }}","generatedAt":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","algorithm":"sha256","artifacts":{}}' > dist/manifest.json
          find dist -type f -name '*.js' -o -name '*.d.ts' | sort | while read f; do
            hash=$(shasum -a 256 "$f" | cut -d' ' -f1)
            node -e "const m=require('./dist/manifest.json');m.artifacts['$(basename $f)']='$hash';require('fs').writeFileSync('./dist/manifest.json',JSON.stringify(m,null,2))"
          done
          cat dist/manifest.json

      - run: npm run test

      - name: Publish CLI package
        run: npm publish --workspace=packages/cli --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish shared package
        run: npm publish --workspace=packages/shared --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish cli-ui package
        run: npm publish --workspace=packages/cli-ui --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish contribute package
        run: npm publish --workspace=packages/contribute --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify provenance attached
        run: |
          sleep 15
          for pkg in opena2a-cli @opena2a/shared @opena2a/cli-ui @opena2a/contribute; do
            attestations=$(npm view "$pkg" dist.attestations --json 2>/dev/null || echo "")
            if [ -z "$attestations" ] || [ "$attestations" = "null" ]; then
              echo "::error::Provenance attestations missing from npm for $pkg"
              exit 1
            fi
            echo "Provenance verified for $pkg"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
